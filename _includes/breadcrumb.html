{% if page.layout == "post" %}
{% assign category = page.categories | first %}
<!-- Breadcrumb Navigation -->
<nav aria-label="breadcrumb" class="breadcrumb-nav">
  <ol class="breadcrumb-list">
    <li><a href="{{ site.baseurl }}/">홈</a></li>
    {% if category %}
    <li><a href="{{ site.baseurl }}/categories.html#{{ category | downcase }}">{{ category }}</a></li>
    {% endif %}
    <li aria-current="page">{{ page.title }}</li>
  </ol>
</nav>

<!-- Breadcrumb Schema -->
<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {
        "@type": "ListItem",
        "position": 1,
        "name": "홈",
        "item": "{{ site.url }}/"
      }{% if category %},
      {
        "@type": "ListItem",
        "position": 2,
        "name": {{ category | jsonify }},
        "item": "{{ site.url }}/categories.html#{{ category | downcase }}"
      },
      {
        "@type": "ListItem",
        "position": 3,
        "name": {{ page.title | jsonify }}
      }{% else %},
      {
        "@type": "ListItem",
        "position": 2,
        "name": {{ page.title | jsonify }}
      }{% endif %}
    ]
  }
</script>
{% endif %}
