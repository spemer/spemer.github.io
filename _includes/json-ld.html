<!-- jekyll-seo-tag가 WebSite/BlogPosting JSON-LD를 자동 생성하므로, 여기서는 추가 정보만 보완 -->

<!-- Person schema (홈페이지에서만) -->
{% if page.url == "/" %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "{{ site.social.name }}",
  "url": "{{ site.url }}",
  "sameAs": [{% for link in site.social.links %}"{{ link }}"{% unless forloop.last %}, {% endunless %}{% endfor %}]
}
</script>
{% endif %}

<!-- Review schema (review 포스팅에서만) -->
{% if page.review %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "{{ page.review_type | default: 'Thing' }}",
  "name": "{{ page.review_target }}",
  "review": {
    "@type": "Review",
    "author": {
      "@type": "Person",
      "name": "{{ site.social.name }}"
    },
    {% if page.rating %}"reviewRating": {
      "@type": "Rating",
      "ratingValue": "{{ page.rating }}",
      "bestRating": "5"
    },
    {% endif %}"datePublished": "{{ page.date | date_to_xmlschema }}",
    "reviewBody": "{{ page.description | strip_html | escape }}"
  }
}
</script>
{% elsif page.layout == "post" %}
<!-- Article schema (일반 포스팅) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{ page.title | escape }}",
  "author": {
    "@type": "Person",
    "name": "{{ site.social.name }}",
    "url": "{{ site.url }}"
  },
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  {% if page.last_modified_at %}"dateModified": "{{ page.last_modified_at | date_to_xmlschema }}",
  {% endif %}"description": "{{ page.description | strip_html | escape }}"{% if page.image %},
  "image": "{{ site.url }}/{{ page.image }}"{% endif %}
}
</script>
{% endif %}
